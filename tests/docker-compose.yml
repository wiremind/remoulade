services:
  redis:
    image: redis
    ports:
      - "6481:6379"
  rabbitmq:
    image: rabbitmq
    ports:
      - "5784:5672"
  postgres:
    image: ghcr.io/pgmq/pg18-pgmq:latest
    ports:
      - "5544:5432"
    environment:
      POSTGRES_USER: remoulade
      POSTGRES_HOST_AUTH_METHOD: trust
      POSTGRES_DB: test
    volumes:
      - ./docker/postgres/01-create-pgmq-extension.sql:/docker-entrypoint-initdb.d/01-create-pgmq-extension.sql:ro
